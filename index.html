<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard EPT & EPB - APR vs JAN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  /* Theme: Ivory & Professional */
  --bg:#fdfaf5; --bg2:#ffffff; --bg3:#f4f1ea; --border:#e2e0d9; --border2:rgba(0,0,0,0.05);
  --red:#d63a2f; --red-hi:#f04438; --blue:#3b8cf0; --blue-dim:rgba(59,140,240,0.1);
  --green:#16a34a; --text:#2d3436; --text2:#636e72; --text3:#b2bec3;
  --font:'Roboto',sans-serif; --display:'Syne',sans-serif; --mono:'DM Mono',monospace;
  --r:10px; --r-lg:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:50px}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:200;background:rgba(253,250,245,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between}
.brand-name{font-family:var(--display);font-weight:700;font-size:14px}
.brand-name em{color:var(--red);font-style:normal}

.main{max-width:1440px;margin:0 auto;padding:20px 24px}

/* ── MULTI CHECKBOX FILTER ── */
.fbar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;margin-bottom:20px;box-shadow:0 4px 20px rgba(0,0,0,0.03)}
.fgrid{display:grid;grid-template-columns:repeat(4, 1fr) 150px;gap:15px;align-items:start}

.fi-group{display:flex;flex-direction:column;gap:6px}
.fi-lbl{font-size:11px;font-weight:800;text-transform:uppercase;color:var(--text2);display:flex;justify-content:space-between}
.fi-lbl span{color:var(--red);cursor:pointer;font-weight:400;text-transform:none}

.cb-list{
  background:var(--bg); border:1px solid var(--border); border-radius:var(--r);
  height:120px; overflow-y:auto; padding:8px; display:flex; flex-direction:column; gap:4px;
}
.cb-item{display:flex; align-items:center; gap:8px; font-size:11px; cursor:pointer; padding:2px 4px; border-radius:4px}
.cb-item:hover{background:var(--bg3)}
.cb-item input{cursor:pointer; accent-color:var(--red)}

.fi-hke input{width:100%; padding:10px; border:1px solid var(--border); border-radius:var(--r); background:var(--bg)}
.btn-ap{background:var(--red); color:#fff; border:none; padding:12px; border-radius:var(--r); font-weight:700; cursor:pointer; margin-top:20px; transition: 0.2s}
.btn-ap:hover{background:var(--red-hi); box-shadow: 0 4px 12px rgba(214, 58, 47, 0.2)}

/* ── CARDS ── */
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.card{background:var(--bg2); border:1px solid var(--border); border-radius:var(--r-lg); padding:16px; border-top:3px solid var(--border)}
.card-apr{border-top-color: var(--red)}
.card-jan{border-top-color: var(--blue); background: var(--bg3)}
.cv{font-size:26px; font-weight:800; letter-spacing:-1px}
.cs{font-family:var(--mono); font-size:10px; color:var(--text2)}

/* ── PANELS ── */
.crow{display:grid;grid-template-columns:2fr 1fr 1fr;gap:15px;margin-bottom:20px}
.panel{background:var(--bg2); border:1px solid var(--border); border-radius:var(--r-lg); overflow:hidden}
.ph{padding:12px 16px; background:var(--bg3); font-weight:700; font-size:12px; border-bottom:1px solid var(--border)}
.pb{padding:16px}
.cbox{height:300px; position:relative}

/* ── TABLES ── */
.tw{overflow:auto}
table{width:100%; border-collapse:collapse}
th{text-align:left; font-size:9px; text-transform:uppercase; color:var(--text2); padding:10px; background:var(--bg3); position:sticky; top:0; z-index: 10}
td{padding:10px; font-size:11px; border-bottom:1px solid var(--border2)}
.r{text-align:right}
.sep{border-left:2px solid var(--bg3)}
.bdg{padding:2px 6px; border-radius:4px; font-family:var(--mono); font-weight:700}
.ept-ok{background:#dcfce7; color:#166534}
.ept-low{background:#fee2e2; color:#991b1b}

.gb-wrap{margin-bottom:12px; display:flex; align-items:center; gap:10px}
.gbb{padding:5px 12px; font-size:11px; border-radius:20px; border:1px solid var(--border); cursor:pointer; background: #fff}
.gbb.on{background:var(--text); color:#fff; border-color:var(--text)}

#ov{position:absolute; inset:0; background:var(--bg2); display:flex; align-items:center; justify-content:center; z-index:100}
.spinner{width:24px; height:24px; border:3px solid var(--bg3); border-top-color:var(--red); border-radius:50%; animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header class="hdr">
  <div class="brand-name">Dashboard Monitor <em>EPT &amp; EPB</em></div>
  <div style="font-size:11px; font-weight:600; color:var(--text2)">Baseline: JAN vs Current: APR 2026</div>
</header>

<div class="main">
  <div class="fbar">
    <div class="gb-wrap">
      <span style="font-size:11px; font-weight:800; color:var(--text2)">GRUP ANALISIS:</span>
      <button class="gbb" data-g="region" onclick="setGroup(this)">REGION</button>
      <button class="gbb on" data-g="cabang" onclick="setGroup(this)">CABANG</button>
      <button class="gbb" data-g="area" onclick="setGroup(this)">AREA</button>
    </div>
    
    <div class="fgrid">
      <div class="fi-group">
        <label class="fi-lbl">Region <span onclick="toggleAll('fr', true)">All</span></label>
        <div class="cb-list" id="fr"></div>
      </div>
      <div class="fi-group">
        <label class="fi-lbl">Cabang <span onclick="toggleAll('fc', true)">All</span></label>
        <div class="cb-list" id="fc"></div>
      </div>
      <div class="fi-group">
        <label class="fi-lbl">Area <span onclick="toggleAll('fa', true)">All</span></label>
        <div class="cb-list" id="fa"></div>
      </div>
      <div class="fi-group">
        <label class="fi-lbl">Divisi <span onclick="toggleAll('fdiv', true)">All</span></label>
        <div class="cb-list" id="fdiv"></div>
      </div>
      <div class="fi-group fi-hke">
        <label class="fi-lbl">Maks HKE</label>
        <input type="number" id="fhke" value="31">
        <button class="btn-ap" onclick="render()">TERAPKAN</button>
      </div>
    </div>
  </div>

  <div class="cards">
    <div class="card card-apr">
      <div style="font-size:9px; font-weight:700; color:var(--red)">EPT - APRIL</div>
      <div class="cv" id="cv-ept1">—</div>
      <div class="cs" id="cs-ept1">—</div>
    </div>
    <div class="card card-apr">
      <div style="font-size:9px; font-weight:700; color:var(--red)">EPB - APRIL</div>
      <div class="cv" id="cv-epb1">—</div>
      <div class="cs" id="cs-epb1">—</div>
    </div>
    <div class="card card-jan">
      <div style="font-size:9px; font-weight:700; color:var(--blue)">EPT - JANUARI</div>
      <div class="cv" id="cv-ept2" style="font-size:22px; color:var(--text2)">—</div>
      <div class="cs" id="cs-ept2">—</div>
    </div>
    <div class="card card-jan">
      <div style="font-size:9px; font-weight:700; color:var(--blue)">EPB - JANUARI</div>
      <div class="cv" id="cv-epb2" style="font-size:22px; color:var(--text2)">—</div>
      <div class="cs" id="cs-epb2">—</div>
    </div>
  </div>

  <div class="crow">
    <div class="panel">
      <div class="ph">Trend EPT Harian (APR vs JAN)</div>
      <div class="pb">
        <div class="cbox">
          <canvas id="ch"></canvas>
          <div id="ov"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="ph">Top EPT (APR)</div>
      <div class="tw" id="tRankEPT"></div>
    </div>
    <div class="panel">
      <div class="ph">Top EPB (APR)</div>
      <div class="tw" id="tRankEPB"></div>
    </div>
  </div>

  <div class="panel">
    <div class="ph">Detail Perbandingan Data (APR vs JAN)</div>
    <div class="tw" id="tDet" style="max-height:500px"></div>
  </div>
</div>

<script>
const SS_ID   = '1cRoZyleTMYqBhZmzr9OgQVRz29ZAyGYeTm_aieKAg3g';
const API_KEY = 'AIzaSyBE8dSxs_7dLqHFF4M3W_mCoxmjnpBib1k';
const CUR_MO = 'APR', PRE_MO = 'JAN';
const EPT_STD = 7, EPB_STD = 12;

let RAW = { ept: [], epb: [] };
let grp = 'cabang';
let chart = null;

addEventListener('DOMContentLoaded', () => { initChart(); loadAll(); });

async function loadAll() {
  document.getElementById('ov').style.display = 'flex';
  try {
    const [re, rb] = await Promise.all([ fetchSh('EPT!A:J'), fetchSh('EPB!A:J') ]);
    RAW.ept = parseData(re, true);
    RAW.epb = parseData(rb, false);
    initFilterLists();
    render();
  } catch(e) { console.error(e); }
  document.getElementById('ov').style.display = 'none';
}

async function fetchSh(range) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SS_ID}/values/${encodeURIComponent(range)}?key=${API_KEY}`;
  const res = await fetch(url);
  return (await res.json()).values || [];
}

function parseData(rows, isEPT) {
  if (rows.length < 2) return [];
  const h = rows[0].map(s=>s.trim().toLowerCase());
  return rows.slice(1).map(r=>{
    const o={}; h.forEach((k,i)=>o[k]=(r[i]||'').trim());
    return {
      region: o['nama_region'], cabang: o['cabang'], area: o['area'],
      bulan: o['bulan'], hke: +o['hke']||0, div: o['div_sls'],
      tgl: o['tgl'], er: +o['total_eceran']||0,
      val: isEPT ? (+o['total_ec']||0) : (+o['total_effective_outlet']||0)
    };
  });
}

// ── CASCADING FILTERS ──

function initFilterLists() {
  const all = [...RAW.ept, ...RAW.epb];
  updateChecklist('fr', [...new Set(all.map(r=>r.region))]);
  
  document.getElementById('fr').addEventListener('change', () => cascadeFilters('fr'));
  document.getElementById('fc').addEventListener('change', () => cascadeFilters('fc'));
  
  cascadeFilters('start');
  updateChecklist('fdiv', [...new Set(all.map(r=>r.div))]);
}

function cascadeFilters(triggerId) {
  const all = [...RAW.ept, ...RAW.epb];
  const selectedReg = getChecked('fr');
  const selectedCab = getChecked('fc');

  if (triggerId === 'start' || triggerId === 'fr') {
    const cabOpsi = [...new Set(all.filter(r => selectedReg.length === 0 || selectedReg.includes(r.region)).map(r => r.cabang))];
    updateChecklist('fc', cabOpsi);
  }

  if (triggerId === 'start' || triggerId === 'fr' || triggerId === 'fc') {
    const areaOpsi = [...new Set(all.filter(r => 
      (selectedReg.length === 0 || selectedReg.includes(r.region)) &&
      (selectedCab.length === 0 || selectedCab.includes(r.cabang))
    ).map(r => r.area))];
    updateChecklist('fa', areaOpsi);
  }
}

function updateChecklist(id, items) {
  const container = document.getElementById(id);
  const currentChecked = getChecked(id);
  const sorted = items.filter(Boolean).sort();
  container.innerHTML = sorted.map(v => `
    <label class="cb-item">
      <input type="checkbox" value="${v}" ${currentChecked.includes(v) ? 'checked' : ''}> ${v}
    </label>
  `).join('');
}

function getChecked(id) {
  return Array.from(document.querySelectorAll(`#${id} input:checked`)).map(i => i.value);
}

function toggleAll(id, state) {
  document.querySelectorAll(`#${id} input`).forEach(i => i.checked = state);
  cascadeFilters(id);
}

// ── CORE RENDER ──

function render() {
  const f = {
    reg: getChecked('fr'), cab: getChecked('fc'), area: getChecked('fa'), div: getChecked('fdiv'),
    hke: +document.getElementById('fhke').value || 31
  };

  const filterLogic = (r, mo, useHke) => (
    r.bulan === mo &&
    (f.reg.length === 0 || f.reg.includes(r.region)) &&
    (f.cab.length === 0 || f.cab.includes(r.cabang)) &&
    (f.area.length === 0 || f.area.includes(r.area)) &&
    (f.div.length === 0 || f.div.includes(r.div)) &&
    (!useHke || r.hke <= f.hke)
  );

  const eA = RAW.ept.filter(r => filterLogic(r, CUR_MO, true));
  const eJ = RAW.ept.filter(r => filterLogic(r, PRE_MO, true));
  const bA = RAW.epb.filter(r => filterLogic(r, CUR_MO, false));
  const bJ = RAW.epb.filter(r => filterLogic(r, PRE_MO, false));

  updateCards(eA, bA, eJ, bJ);
  updateChart(eA, eJ);
  
  const tblA = buildSummaryTable(eA, bA);
  const tblJ = buildSummaryTable(eJ, bJ);
  
  renderRank(tblA, 'tRankEPT', 'ept', EPT_STD);
  renderRank(tblA, 'tRankEPB', 'epb', EPB_STD);
  renderDetail(tblA, tblJ);
}

function updateCards(eA, bA, eJ, bJ) {
  const calc = (rows) => {
    const er = rows.reduce((a,b)=>a+b.er,0), v = rows.reduce((a,b)=>a+b.val,0);
    return { avg: v ? (er/v) : 0, er, v };
  };
  const rAA = calc(eA), rAB = calc(bA), rJA = calc(eJ), rJB = calc(bJ);

  const set = (idV, idS, res, std) => {
    const el = document.getElementById(idV);
    el.textContent = res.avg.toFixed(2);
    el.style.color = res.avg >= std ? 'var(--green)' : 'var(--red)';
    document.getElementById(idS).textContent = `${res.er.toLocaleString()} / ${res.v.toLocaleString()}`;
  };
  set('cv-ept1', 'cs-ept1', rAA, EPT_STD);
  set('cv-epb1', 'cs-epb1', rAB, EPB_STD);
  set('cv-ept2', 'cs-ept2', rJA, EPT_STD);
  set('cv-epb2', 'cs-epb2', rJB, EPB_STD);
}

function initChart() {
  const ctx = document.getElementById('ch').getContext('2d');
  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: [],
      datasets: [
        { label: 'APR 2026', data: [], backgroundColor: 'rgba(214, 58, 47, 0.7)', borderRadius: 4 },
        { label: 'JAN 2026', data: [], type: 'line', borderColor: '#3b8cf0', backgroundColor: 'rgba(59, 140, 240, 0.05)', fill: true, tension: 0.4 }
      ]
    },
    options: { 
        responsive: true, 
        maintainAspectRatio: false, 
        plugins: { legend: { position: 'bottom' } },
        scales: {
            x: { grid: { display: false } },
            y: { grid: { color: 'rgba(0,0,0,0.03)' } }
        }
    }
  });
}

function updateChart(apr, jan) {
  const agg = (data) => {
    const m = {};
    data.forEach(r => {
      const d = r.tgl.split('/')[0].padStart(2, '0');
      if(!m[d]) m[d] = {er:0, v:0};
      m[d].er += r.er; m[d].v += r.val;
    });
    return m;
  };
  const mA = agg(apr), mJ = agg(jan);
  const days = [...Array(31).keys()].map(i => (i+1).toString().padStart(2, '0'));
  chart.data.labels = days;
  chart.data.datasets[0].data = days.map(d => mA[d]?.v ? (mA[d].er/mA[d].v) : null);
  chart.data.datasets[1].data = days.map(d => mJ[d]?.v ? (mJ[d].er/mJ[d].v) : null);
  chart.update();
}

function buildSummaryTable(ept, epb) {
  const m = {};
  const getKey = r => grp === 'region' ? r.region : (grp === 'area' ? r.area : r.cabang);
  ept.forEach(r => { const k = getKey(r); if(!m[k]) m[k] = { label: k, eEr:0, eVal:0, bEr:0, bVal:0 }; m[k].eEr += r.er; m[k].eVal += r.val; });
  epb.forEach(r => { const k = getKey(r); if(!m[k]) m[k] = { label: k, eEr:0, eVal:0, bEr:0, bVal:0 }; m[k].bEr += r.er; m[k].bVal += r.val; });
  return Object.values(m).map(i => ({ 
      label: i.label, 
      ept: i.eVal ? (i.eEr/i.eVal) : 0, 
      epb: i.bVal ? (i.bEr/i.bVal) : 0 
  }));
}

function renderRank(data, targetId, sortKey, std) {
  const sorted = [...data].sort((a,b) => b[sortKey] - a[sortKey]).slice(0, 10);
  let h = `<table><thead><tr><th>#</th><th>${grp.toUpperCase()}</th><th class="r">VAL</th></tr></thead><tbody>`;
  sorted.forEach((r, i) => { 
      h += `<tr><td><span style="font-size:10px; font-weight:700; color:var(--text3)">${i+1}</span></td><td style="font-weight:600">${r.label}</td><td class="r">${bdg(r[sortKey], std)}</td></tr>`; 
  });
  document.getElementById(targetId).innerHTML = h + `</tbody></table>`;
}

function renderDetail(apr, jan) {
  const janMap = Object.fromEntries(jan.map(i => [i.label, i]));
  
  let h = `<table><thead><tr>
    <th rowspan="2">${grp.toUpperCase()}</th>
    <th colspan="3" class="r" style="background:#fff5f5">EPT (APR VS JAN)</th>
    <th colspan="3" class="r sep" style="background:#f5faff">EPB (APR VS JAN)</th>
  </tr><tr>
    <th class="r">APR</th><th class="r">JAN</th><th class="r">GAP</th>
    <th class="r sep">APR</th><th class="r">JAN</th><th class="r">GAP</th>
  </tr></thead><tbody>`;

  apr.sort((a,b) => b.ept - a.ept).forEach(a => {
    const j = janMap[a.label] || { ept:0, epb:0 };
    const gapEPT = a.ept - j.ept;
    const gapEPB = a.epb - j.epb;

    h += `<tr>
      <td style="font-weight:600">${a.label}</td>
      <td class="r">${bdg(a.ept, EPT_STD)}</td>
      <td class="r" style="color:var(--text3)">${j.ept.toFixed(2)}</td>
      <td class="r" style="color:${gapEPT>=0?'var(--green)':'var(--red)'}; font-weight:700">${gapEPT >= 0 ? '+' : ''}${gapEPT.toFixed(2)}</td>
      
      <td class="r sep">${bdg(a.epb, EPB_STD)}</td>
      <td class="r" style="color:var(--text3)">${j.epb.toFixed(2)}</td>
      <td class="r" style="color:${gapEPB>=0?'var(--green)':'var(--red)'}; font-weight:700">${gapEPB >= 0 ? '+' : ''}${gapEPB.toFixed(2)}</td>
    </tr>`;
  });
  document.getElementById('tDet').innerHTML = h + `</tbody></table>`;
}

function bdg(v, std) { return `<span class="bdg ${v>=std?'ept-ok':'ept-low'}">${v.toFixed(2)}</span>`; }

function setGroup(btn) {
  document.querySelectorAll('.gbb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  grp = btn.dataset.g;
  render();
}
</script>
</body>
</html>
